name: Build Mod

on:
push:
workflow_dispatch:

jobs:
build:
runs-on: windows-latest

```
steps:
  - uses: actions/checkout@v4

  - name: Clone Geode
    run: git clone https://github.com/geode-sdk/geode

  - name: Configure
    run: cmake -B build -DGEODE_SDK=geode

  - name: Build
    run: cmake --build build --config Release

  - name: Upload
    uses: actions/upload-artifact@v4
    with:
      name: LevelGenerator
      path: build
```
